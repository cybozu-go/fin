name: "e2e"
on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "NOTICE"
      - "LICENSE"
  push:
    paths-ignore:
      - "**/*.md"
      - "NOTICE"
      - "LICENSE"
    branches:
      - "main"

permissions:
  contents: read

env:
  # Github runner's extra disk is mounted on the /mnt directory.
  MINIKUBE_HOME: "/mnt/"

jobs:
  build:
    runs-on: "ubuntu-22.04"
    strategy:
      fail-fast: false
      matrix:
        label-filter:
          - full-backup
          - incremental-backup
          - misc
          - finbackupconfig
        kubernetes-version:
          - "1.34.4"
          - "1.35.4"
    env:
      KUBERNETES_VERSION: ${{ matrix.kubernetes-version }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/.ghcup /usr/local/lib/android
          df -h /

      - name: Make /mnt accessible from `runner` user
        run: |
          sudo chown runner:runner /mnt

      - uses: ./.github/actions/set-up-kvm-for-e2e-tests
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # The custom-ceph stage depends only on the Dockerfile, so cache it
      # with a branch-independent key. A cache entry created on the main
      # branch is restorable from every pull request.
      - name: Restore custom-ceph cache
        id: cache-custom-ceph
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/custom-ceph-cache
          key: custom-ceph-${{ hashFiles('Dockerfile') }}
      - name: Build custom-ceph stage
        if: steps.cache-custom-ceph.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: custom-ceph
          cache-to: type=local,dest=/tmp/custom-ceph-cache

      - name: Build and push Docker image with cache
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          tags: controller:latest
          load: true
          cache-from: type=local,src=/tmp/custom-ceph-cache

      - name: Setup minikube with kvm2 driver
        run: |
            make -C test/e2e launch-minikube

      - name: Load image into minikube
        run: |
            make -C test/e2e image-tar-load
            # Display disk usage after loading image
            df -h /

      - name: Launch rook-ceph and deploy components
        run: |
          make -C test/e2e launch-rook-ceph
          make -C test/e2e setup-fin-volume
          make -C test/e2e setup-components

      - name: Run e2e tests
        run: |
          make -C test/e2e do-test \
          GINKGO_FLAGS=--label-filter='${{ matrix.label-filter }}'
