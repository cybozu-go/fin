name: "Main"
on:
  pull_request:
    paths-ignore:
      - "**/*.md"
  push:
    paths-ignore:
      - "**/*.md"
    branches:
      - "main"

permissions:
  contents: read

jobs:
  build:
    name: "build"
    runs-on: "ubuntu-22.04"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go mod tidy && make generate && make manifests && make check-uncommitted
      - run: make build
      - run: make lint
      - run: make test
